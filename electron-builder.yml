appId: com.sios.readyourmind
productName: SIOS
copyright: Copyright © 2025 SIOS Team

directories:
  output: dist-electron
  buildResources: build

files:
  - electron/**/*
  - .next/standalone/**/*
  - .next/standalone/.next/**/*
  - public/**/*

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"

asar: false

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico

mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.productivity

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SIOS
  perMachine: false
  allowElevation: true
