appId: com.sios.readyourmind
productName: SIOS
copyright: Copyright © 2024 SIOS Team

directories:
  output: dist-electron

files:
  - electron/**/*
  - .next/standalone/**/*
  - public/**/*

win:
  target:
    - nsis
    - portable
  icon: public/icon-512.png

mac:
  target:
    - dmg
  icon: public/icon-512.png
  category: public.app-category.productivity

linux:
  target:
    - AppImage
    - deb
  icon: public/icon-512.png
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/icon-512.png
  uninstallerIcon: public/icon-512.png
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SIOS
